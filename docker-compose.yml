services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agenda
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: agenda_pass
    ports:
      - "5432:5432"
    volumes:
      - agenda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda_user -d agenda"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - agenda_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Agenda.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=agenda;Username=agenda_user;Password=agenda_pass"
      RUN_MIGRATIONS: "true"
      Jwt__Issuer: agenda-api
      Jwt__Audience: agenda-frontend
      # Dev/disposable key — replace with a real secret in production
      Jwt__Key: "Agenda@Compose!Dev!SecretKey#2026JwtToken!!MustBe32CharsMin"
      Jwt__ExpiresMinutes: "60"
      AuthSeed__Username: admin
      AuthSeed__Password: admin123
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Cors__AllowedOrigins__0: "http://localhost:5173"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/Agenda.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  agenda_pgdata:
    driver: local
  agenda_rabbitmq_data:
    driver: local
