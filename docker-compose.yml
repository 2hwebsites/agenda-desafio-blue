services:
  postgres:
    image: postgres:17-alpine
    container_name: agenda_postgres
    environment:
      POSTGRES_DB: agenda
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: agenda_pass
    ports:
      - "5432:5432"
    volumes:
      - agenda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda_user -d agenda"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agenda_pgdata:
    driver: local
