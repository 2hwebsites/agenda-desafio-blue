server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — required for Vue Router history mode (F5 on /contacts must not 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-term cache for fingerprinted static assets
    location ~* \.(js|css|ico|svg|woff|woff2|ttf|eot|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
